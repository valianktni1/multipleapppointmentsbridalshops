# Serves the React SPA and proxies /api to the backend container.
# The external TrueNAS Nginx Proxy Manager host should forward the ORIGINAL
# Host header to this container (proxy_set_header Host $host;).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API -> backend service (see docker-compose service name 'backend')
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Path-based tenant routing is handled client-side by the SPA router.
    # Every non-file path must fall back to index.html so /{tenant},
    # /{tenant}/admin and /superadmin all load the app.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache static assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
